<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvem de Letras e Chuva - Com Reflexo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            text-align: center;
            padding: 20px 50px 0 50px;
            width: 100%;
        }

        /* Nuvem desfocada no topo */
        .cloud {
            position: relative;
            width: 550px;
            height: 260px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 150px;
            margin: 20px auto 0 auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            animation: floatCloud 3s ease-in-out infinite;
            filter: blur(6px);
            backdrop-filter: blur(2px);
        }

        /* Bolhas da nuvem */
        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }

        .cloud::before {
            width: 170px;
            height: 170px;
            top: -70px;
            left: 30px;
        }

        .cloud::after {
            width: 200px;
            height: 200px;
            top: -95px;
            left: 120px;
        }

        .cloud .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }

        .bubble-1 {
            width: 150px;
            height: 150px;
            top: -60px;
            right: 40px;
        }

        .bubble-2 {
            width: 110px;
            height: 110px;
            top: -30px;
            right: 130px;
        }

        @keyframes floatCloud {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        /* Área da chuva */
        .rain-area {
            position: relative;
            width: 550px;
            margin: 0 auto;
            overflow: visible;
        }

        /* Container das letras e gotas caindo */
        .falling-container {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 500px;
            pointer-events: none;
            overflow: visible;
        }

        /* Letras caindo - BRANCAS */
        .falling-letter {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            font-family: 'Courier New', 'Monaco', monospace;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            animation: fallLetter linear forwards;
            pointer-events: none;
            z-index: 10;
            max-width: 100%;
        }

        /* Gotas de chuva */
        .raindrop {
            position: absolute;
            background: linear-gradient(180deg, #ffffff, #ccccff);
            width: 2px;
            border-radius: 1px;
            animation: fallDrop linear forwards;
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
        }

        /* Animação das letras */
        @keyframes fallLetter {
            0% {
                transform: translateY(0px) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(480px) translateX(5px);
                opacity: 0.5;
            }
        }

        /* Animação das gotas */
        @keyframes fallDrop {
            0% {
                transform: translateY(0px) translateX(0);
                opacity: 0.9;
            }
            100% {
                transform: translateY(480px) translateX(3px);
                opacity: 0.3;
            }
        }

        /* Chão - linha sutil com efeito de espelho */
        .subtle-ground {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.5) 20%, 
                rgba(255, 255, 255, 0.8) 50%, 
                rgba(255, 255, 255, 0.5) 80%, 
                transparent);
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* Efeito de espelho/reflexo no chão */
        .reflection-container {
            position: fixed;
            bottom: 78px;
            left: 0;
            right: 0;
            height: 120px;
            pointer-events: none;
            z-index: 15;
            overflow: hidden;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(0, 0, 0, 0.3) 20%,
                rgba(0, 0, 0, 0.6) 50%,
                rgba(0, 0, 0, 0.8) 80%,
                rgba(0, 0, 0, 0.9) 100%);
        }

        /* Elemento de reflexo das letras */
        .letter-reflection {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            font-family: 'Courier New', 'Monaco', monospace;
            color: rgba(255, 255, 255, 0.4);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            transform: scaleY(-0.6);
            filter: blur(3px);
            pointer-events: none;
            z-index: 16;
            animation: reflectFade 0.8s ease-out forwards;
            white-space: nowrap;
        }

        /* Reflexo das gotas */
        .drop-reflection {
            position: fixed;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(200, 200, 255, 0.2));
            width: 2px;
            border-radius: 1px;
            transform: scaleY(-0.5);
            filter: blur(2px);
            pointer-events: none;
            z-index: 16;
            animation: reflectFade 0.6s ease-out forwards;
        }

        @keyframes reflectFade {
            0% {
                opacity: 0.6;
                transform: scaleY(-0.6) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scaleY(-0.6) translateY(30px);
            }
        }

        /* Ondulações no reflexo */
        .ripple-reflection {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent);
            animation: rippleReflect 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 17;
        }

        @keyframes rippleReflect {
            0% {
                transform: scale(0);
                opacity: 0.5;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Efeito de impacto no chão */
        .impact-effect {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6), transparent);
            animation: impact 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 25;
        }

        @keyframes impact {
            0% {
                transform: scale(0);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .cloud, .rain-area {
                width: 380px;
            }
            
            .cloud {
                height: 180px;
                filter: blur(4px);
            }
            
            .cloud::before {
                width: 120px;
                height: 120px;
                top: -50px;
                left: 20px;
            }
            
            .cloud::after {
                width: 140px;
                height: 140px;
                top: -70px;
                left: 80px;
            }
            
            .bubble-1 {
                width: 100px;
                height: 100px;
                top: -40px;
                right: 25px;
            }
            
            .bubble-2 {
                width: 75px;
                height: 75px;
                top: -20px;
                right: 90px;
            }
            
            .falling-letter {
                font-size: 22px;
            }
            
            .raindrop {
                width: 1.5px;
            }
            
            .falling-container {
                height: 400px;
            }
            
            @keyframes fallLetter {
                100% {
                    transform: translateY(380px) translateX(5px);
                }
            }
            
            @keyframes fallDrop {
                100% {
                    transform: translateY(380px) translateX(3px);
                }
            }
            
            .subtle-ground {
                bottom: 60px;
            }
            
            .reflection-container {
                bottom: 58px;
                height: 100px;
            }
            
            .letter-reflection {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rain-area">
            <div class="cloud">
                <div class="bubble bubble-1"></div>
                <div class="bubble bubble-2"></div>
            </div>
            
            <!-- Container das letras e gotas caindo -->
            <div class="falling-container" id="fallingContainer"></div>
        </div>
    </div>
    
    <!-- Chão com efeito de espelho -->
    <div class="subtle-ground"></div>
    <div class="reflection-container" id="reflectionContainer"></div>

    <script>
        // Letras do alfabeto
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        
        // Função para gerar letra aleatória
        function getRandomLetter() {
            return alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        }

        // Função para criar gota de chuva
        function createRaindrop(cloudWidth) {
            const fallingContainer = document.getElementById('fallingContainer');
            if (!fallingContainer) return;
            
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            
            const randomX = Math.random() * (cloudWidth - 4);
            const duration = 1.0 + Math.random() * 0.8;
            const dropHeight = 16 + Math.random() * 12;
            
            drop.style.left = randomX + 'px';
            drop.style.animationDuration = duration + 's';
            drop.style.height = dropHeight + 'px';
            drop.style.width = '2px';
            
            const delay = Math.random() * 0.2;
            drop.style.animationDelay = delay + 's';
            
            fallingContainer.appendChild(drop);
            
            const fallTime = (duration + delay) * 1000;
            setTimeout(() => {
                if (drop && drop.parentNode) {
                    createGroundImpact(randomX);
                    createDropReflection(randomX);
                    drop.remove();
                }
            }, fallTime);
        }

        // Função para criar letra caindo
        function createFallingLetter(cloudWidth) {
            const fallingContainer = document.getElementById('fallingContainer');
            if (!fallingContainer) return;
            
            const letter = document.createElement('div');
            letter.className = 'falling-letter';
            
            const letterSize = 28;
            const maxX = Math.max(0, cloudWidth - letterSize);
            const randomX = Math.random() * maxX;
            
            const duration = 1.2 + Math.random() * 0.9;
            const size = 24 + Math.random() * 12;
            const letterChar = getRandomLetter();
            
            letter.textContent = letterChar;
            letter.style.left = randomX + 'px';
            letter.style.fontSize = size + 'px';
            letter.style.animationDuration = duration + 's';
            
            const delay = Math.random() * 0.2;
            letter.style.animationDelay = delay + 's';
            
            fallingContainer.appendChild(letter);
            
            const fallTime = (duration + delay) * 1000;
            setTimeout(() => {
                if (letter && letter.parentNode) {
                    createGroundImpact(randomX);
                    createLetterReflection(randomX, letterChar, size);
                    letter.remove();
                }
            }, fallTime);
        }

        // Função para criar reflexo da letra no chão (efeito espelhado)
        function createLetterReflection(x, letterChar, size) {
            const reflectionContainer = document.getElementById('reflectionContainer');
            if (!reflectionContainer) return;
            
            const rainAreaRect = document.querySelector('.rain-area').getBoundingClientRect();
            const impactX = rainAreaRect.left + x;
            
            const reflection = document.createElement('div');
            reflection.className = 'letter-reflection';
            reflection.textContent = letterChar;
            reflection.style.left = (impactX - 10) + 'px';
            reflection.style.bottom = '78px';
            reflection.style.fontSize = size + 'px';
            
            // Pequeno deslocamento para efeito mais natural
            const offsetX = (Math.random() - 0.5) * 8;
            reflection.style.transform = `scaleY(-0.6) translateX(${offsetX}px)`;
            
            document.body.appendChild(reflection);
            
            setTimeout(() => {
                if (reflection && reflection.remove) {
                    reflection.remove();
                }
            }, 800);
        }

        // Função para criar reflexo da gota no chão
        function createDropReflection(x) {
            const rainAreaRect = document.querySelector('.rain-area').getBoundingClientRect();
            const impactX = rainAreaRect.left + x;
            
            const reflection = document.createElement('div');
            reflection.className = 'drop-reflection';
            reflection.style.left = (impactX - 5) + 'px';
            reflection.style.bottom = '78px';
            reflection.style.height = '15px';
            reflection.style.width = '1.5px';
            
            document.body.appendChild(reflection);
            
            setTimeout(() => {
                if (reflection && reflection.remove) {
                    reflection.remove();
                }
            }, 600);
        }

        // Função para criar ondulação no reflexo
        function createRippleReflection(x) {
            const rainAreaRect = document.querySelector('.rain-area').getBoundingClientRect();
            const impactX = rainAreaRect.left + x;
            
            const ripple = document.createElement('div');
            ripple.className = 'ripple-reflection';
            ripple.style.left = (impactX - 15) + 'px';
            ripple.style.bottom = '70px';
            ripple.style.width = '30px';
            ripple.style.height = '30px';
            
            document.body.appendChild(ripple);
            
            setTimeout(() => {
                if (ripple && ripple.remove) {
                    ripple.remove();
                }
            }, 600);
        }

        // Função para criar efeito de impacto no chão
        function createGroundImpact(x) {
            const impact = document.createElement('div');
            impact.className = 'impact-effect';
            
            const rainAreaRect = document.querySelector('.rain-area').getBoundingClientRect();
            const impactX = rainAreaRect.left + x;
            
            impact.style.position = 'fixed';
            impact.style.left = (impactX - 10) + 'px';
            impact.style.bottom = '80px';
            impact.style.width = '20px';
            impact.style.height = '20px';
            
            document.body.appendChild(impact);
            
            // Criar ondulação no reflexo também
            createRippleReflection(x);
            
            setTimeout(() => {
                if (impact && impact.remove) {
                    impact.remove();
                }
            }, 500);
        }

        // Função principal para iniciar a chuva
        let rainInterval;
        
        function startRain() {
            const cloud = document.querySelector('.cloud');
            if (!cloud) return;
            
            const cloudWidth = cloud.offsetWidth;
            
            if (rainInterval) {
                clearInterval(rainInterval);
            }
            
            rainInterval = setInterval(() => {
                const dropsPerBatch = Math.floor(Math.random() * 5) + 4;
                for (let i = 0; i < dropsPerBatch; i++) {
                    createRaindrop(cloudWidth);
                }
                
                const lettersPerBatch = Math.floor(Math.random() * 3) + 2;
                for (let i = 0; i < lettersPerBatch; i++) {
                    createFallingLetter(cloudWidth);
                }
            }, 100);
        }

        let resizeTimeout;
        function handleResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const fallingContainer = document.getElementById('fallingContainer');
                if (fallingContainer) {
                    const elements = fallingContainer.querySelectorAll('.falling-letter, .raindrop');
                    elements.forEach(el => el.remove());
                }
                
                const reflections = document.querySelectorAll('.letter-reflection, .drop-reflection, .ripple-reflection, .impact-effect');
                reflections.forEach(ref => ref.remove());
                
                startRain();
            }, 250);
        }

        window.addEventListener('load', () => {
            startRain();
        });
        
        window.addEventListener('resize', handleResize);
        
        window.addEventListener('beforeunload', () => {
            if (rainInterval) {
                clearInterval(rainInterval);
            }
        });
    </script>
</body>
</html>
